name: Feature Request
description: Suggest a new feature or improvement for OGStack
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Idea
      description: Describe the feature or improvement you would like to see in OGStack.
      placeholder: Describe your idea...
    validations:
      required: true
