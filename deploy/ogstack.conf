# OGStack Nginx Configuration
#
# Setup:
#   1. Copy this file: sudo cp ogstack.conf /etc/nginx/sites-available/ogstack.conf
#   2. Symlink: sudo ln -s /etc/nginx/sites-available/ogstack.conf /etc/nginx/sites-enabled/
#   3. Test config: sudo nginx -t
#   4. Reload: sudo systemctl reload nginx
#
# Install Certbot if not already set up:
#   sudo apt install snapd
#   sudo snap install --classic certbot
#
#   Install SSL certs:
#   sudo certbot --nginx -d ogstack.dev -d docs.ogstack.dev -d api.ogstack.dev
#   sudo certbot renew --dry-run   # verify auto-renewal

upstream ogstack_api {
    server 127.0.0.1:5000;
}

upstream ogstack_web {
    server 127.0.0.1:5001;
}

upstream ogstack_docs {
    server 127.0.0.1:5002;
}

# Main site - ogstack.dev
server {
    listen 80;
    server_name ogstack.dev www.ogstack.dev;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "upgrade-insecure-requests" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    client_max_body_size 25M;

    # API - /api/* proxied to backend
    location /api/ {
        proxy_pass http://ogstack_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Swagger
    location /swagger {
        proxy_pass http://ogstack_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Health check
    location = /health {
        proxy_pass http://ogstack_api;
        access_log off;
    }

    # Next.js static assets for web
    location /_next/static {
        proxy_pass http://ogstack_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend - everything else
    location / {
        proxy_pass http://ogstack_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# API - api.ogstack.dev
# Requests to api.ogstack.dev/<path> are rewritten to ogstack_api:5000/api/<path>
# so consumers don't have to include the /api prefix. Non-prefixed routes like
# /health and /swagger pass through unchanged.
server {
    listen 80;
    server_name api.ogstack.dev;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    gzip on;
    gzip_types application/json application/javascript text/plain;
    gzip_min_length 256;

    client_max_body_size 25M;

    location = /health {
        proxy_pass http://ogstack_api;
        access_log off;
    }

    location /swagger {
        proxy_pass http://ogstack_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://ogstack_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# Docs - docs.ogstack.dev
server {
    listen 80;
    server_name docs.ogstack.dev;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    location /_next/static {
        proxy_pass http://ogstack_docs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://ogstack_docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
