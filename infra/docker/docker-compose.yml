version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ogstack-postgres
    environment:
      POSTGRES_USER: ogstack
      POSTGRES_PASSWORD: ogstack
      POSTGRES_DB: ogstack
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ogstack']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ogstack-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
